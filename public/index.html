<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Task Management Tool</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .task-container { display: flex; flex-wrap: wrap; gap: 15px; }
        .task-card { 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 250px; 
        }
        .status-done { border-left: 5px solid green; }
        .status-todo { border-left: 5px solid orange; }
    </style>
</head>
<body>
    <h1>Görev Listem</h1>
    <div style="margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px;">
    <h3>Yeni Görev Ekle</h3>
    <input type="text" id="taskTitle" placeholder="Görev Başlığı" style="padding: 5px;">
    <input type="text" id="taskDesc" placeholder="Açıklama" style="padding: 5px;">
    <button onclick="addTask()">Ekle</button>
    <button onclick="deleteAll()" style="background:#c0392b;color:white;border:none;padding:6px 8px;border-radius:4px;cursor:pointer;margin-left:10px;">Tümünü Sil</button>
</div>
    <div id="tasks" class="task-container">Yükleniyor...</div>

    <script>
        // Backend API'mizden verileri çeken fonksiyon
        async function fetchTasks() {
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                
                const taskDiv = document.getElementById('tasks');
                taskDiv.innerHTML = ''; // "Yükleniyor" yazısını temizle

                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = `task-card status-${task.status}`;
                    card.id = `task-${task.id}`;
                    card.dataset.id = task.id;
                    card.innerHTML = `
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                        <small>Durum: ${task.status}</small>
                                                <div style="margin-top:8px; display:flex; gap:8px;">
                                                    <button onclick="deleteTask(${task.id})" style="background:#e74c3c;color:white;border:none;padding:6px 8px;border-radius:4px;cursor:pointer;">Sil</button>
                                                    <button onclick="toggleStatus(${task.id}, '${task.status}')" style="background:#2ecc71;color:white;border:none;padding:6px 8px;border-radius:4px;cursor:pointer;">Durum Değiştir</button>
                                                </div>
                    `;
                    taskDiv.appendChild(card);
                });
            } catch (err) {
                console.error("Veri çekilemedi:", err);
            }
        }

        fetchTasks();

        async function addTask() {
    const title = document.getElementById('taskTitle').value;
    const description = document.getElementById('taskDesc').value;

    const response = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
    });

    if (response.ok) {
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        fetchTasks(); // Listeyi yenile
    }
}

// Görevi silmek için istemci tarafı fonksiyonu
async function deleteTask(id) {
    if (!confirm('Bu görevi silmek istediğinize emin misiniz?')) return;
    try {
        const res = await fetch('/api/tasks/' + id, { method: 'DELETE' });
        if (res.ok) {
            const el = document.getElementById('task-' + id);
            if (el) el.remove();
        } else {
            const err = await res.json().catch(()=>({}));
            alert('Görev silinemedi.' + (err && err.error ? ('\n' + err.error) : ''));
        }
    } catch (e) {
        console.error('Silme hatası:', e);
        alert('Silme sırasında bir hata oluştu. Konsolu kontrol edin.');
    }
}
async function deleteAll() {
    if (!confirm('Tüm görevleri silmek istediğinize emin misiniz?')) return;
    try {
        // Dikkat: URL aynı, sadece ID yok ve metod DELETE
        const res = await fetch('/api/tasks', { method: 'DELETE' }); 
        if (res.ok) {
            fetchTasks(); 
        } else {
            alert('Silinemedi');
        }
    } catch (e) {
        console.error('Hata:', e);
    }
}

// Toggle task status between 'todo' and 'done'
async function toggleStatus(id, currentStatus) {
    console.log("İstek atılan URL:", '/api/tasks/' + id + '/status');
    const newStatus = currentStatus === 'todo' ? 'done' : 'todo';
    try {
        const res = await fetch('/api/tasks/' + id + '/status', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) {
            // Refresh task list to reflect updated status
            fetchTasks();
        } else {
            const err = await res.json().catch(()=>({}));
            alert('Durum değiştirilemedi.' + (err && err.error ? ('\n' + err.error) : ''));
        }
    } catch (e) {
        console.error('Durum değiştirme hatası:', e);
        alert('Durum değiştirme sırasında bir hata oluştu. Konsolu kontrol edin.');
    }
}
    </script>
</body>
</html>
