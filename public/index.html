<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: left;
        }

        h1 { font-weight: 600; margin-bottom: 30px; color: var(--text-main); }

        /* Yeni Görev Paneli */
        .input-section { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group { display: flex; gap: 10px; }

        input { 
            flex: 1;
            padding: 12px 15px; 
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button { 
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #357abd; transform: translateY(-1px); }

        .btn-delete-all { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete-all:hover { background: var(--danger); color: white; }

        /* Görev Kartları Konteynırı */
        .task-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%;
            max-width: 1000px;
        }

        /* Kart Tasarımı */
        .task-card { 
            
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .task-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .task-card h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .task-card p { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 15px; flex-grow: 1; }

        /* Durum Belirteçleri */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .status-todo { border-top: 5px solid #f39c12; }
        .status-todo .status-badge { background: #fef5e7; color: #f39c12; }

        .status-done { border-top: 5px solid var(--success); }
        .status-done .status-badge { background: #eafaf1; color: var(--success); }
        .status-done h3 { text-decoration: line-through; color: #bdc3c7; }

        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        
        .btn-sm { padding: 8px 12px; font-size: 0.85rem; flex: 1; }
        .btn-del { background: #fee; color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; }
        .btn-toggle { background: #eafaf1; color: var(--success); }
        .btn-toggle:hover { background: var(--success); color: white; }
        
        .task-card {
            cursor: grab;
        }
        .task-card:active {
            cursor: grabbing;
        }
        .sortable-ghost {
            opacity: 0.4;
            border: 2px dashed var(--primary);
        }
        .btn-edit-top {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #666;
            transition: color 0.3s, transform 0.2s;
        }

        .btn-edit-top:hover {
            color: #007bff; /* Üzerine gelince mavi olur */
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>🎯 Görev Listem</h1>

    <div class="input-section">
        <h3>Yeni Görev Oluştur</h3>
        <div class="input-group">
            <input type="text" id="taskTitle" placeholder="Görev Başlığı...">
            <input type="text" id="taskDesc" placeholder="Detaylar...">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
            <button class="btn-add" onclick="addTask()">+ Görev Ekle</button>
            <button class="btn-delete-all" onclick="deleteAll()">Tümünü Temizle</button>
        </div>
    </div>

    <div id="tasks" class="task-container">
        </div>

    <script>
       
        async function fetchTasks() {
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                const taskDiv = document.getElementById('tasks');
                taskDiv.innerHTML = ''; 

                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = `task-card status-${task.status}`;
                    card.id = `task-${task.id}`;
                    card.dataset.id = task.id;
                    card.innerHTML = `
                        <button class="btn-edit-top" onclick="editTask(${task.id}, '${task.title}', '${task.description}')">
                            ✎
                        </button>
                        <div>
                            <span class="status-badge">${task.status === 'todo' ? 'Yapılacak' : 'Tamamlandı'}</span>
                            <h3>${task.title}</h3>
                            <p>${task.description || 'Açıklama belirtilmedi.'}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn-sm btn-toggle" onclick="toggleStatus(${task.id}, '${task.status}')">
                                ${task.status === 'todo' ? 'Tamamla' : 'Geri Al'}
                            </button>
                            <button class="btn-sm btn-del" onclick="deleteTask(${task.id})">Sil</button>
                        </div>
                    `;
                    taskDiv.appendChild(card);
                });
            } catch (err) {
                console.error("Hata:", err);
                document.getElementById('tasks').innerHTML = "<p>Görevler yüklenirken bir hata oluştu.</p>";
            }
        }

       async function addTask() {
    const title = document.getElementById('taskTitle').value;
    const description = document.getElementById('taskDesc').value;
    if(!title) return alert("Başlık boş olamaz");

    await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
    });
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    fetchTasks();
}

async function deleteTask(id) {
    if (!confirm('Silmek istediğine emin misin?')) return;
    const res = await fetch('/api/tasks/' + id, { method: 'DELETE' });
    if (res.ok) fetchTasks();
}
async function editTask(id, currentTitle, currentDescription) {
    const newTitle = prompt("Görevi Düzenle:", currentTitle);
    const newDescription = prompt("Açıklamayı Düzenle:", currentDescription);
   
    if (newTitle === null || newTitle.trim() === "") return; 

    try {
        const response = await fetch(`/api/tasks/${id}`, {
            method: 'PUT', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                title: newTitle.trim(),
                description: newDescription.trim()
            })
        });

        if (response.ok) {
            fetchTasks();
        } else {
            alert("Güncelleme sırasında bir hata oluştu.");
        }
    } catch (error) {
        console.error("Hata:", error);
        alert("Sunucuya bağlanılamadı.");
    }
}

async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'todo' ? 'done' : 'todo';
    await fetch(`/api/tasks/${id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
    });
    fetchTasks();
}

async function deleteAll() {
    if (!confirm('Hepsini sil?')) return;
    await fetch('/api/tasks', { method: 'DELETE' });
    fetchTasks();
}
        fetchTasks();

const taskList = document.getElementById('tasks');
new Sortable(taskList, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd: async function () {
        // Sıralama değiştiğinde yeni sıralamayı al
        const items = Array.from(taskList.children);
        const newOrder = items.map((item, index) => ({
            id: item.dataset.id,
            position: index
        }));

        // Yeni sıralamayı backend'e gönder
        await fetch('/api/tasks/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order: newOrder })
        });
    }
});
</script>
</body>
</html>
